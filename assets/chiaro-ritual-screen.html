<style>
  :root{ --field:#17110c; --lamp:#F2A24A; --dim:#8a6a4a; --soft:#c9b18f; }

  body{margin:0; min-height:100vh; background:var(--field); color:var(--soft);
    font-family:'Plus Jakarta Sans',sans-serif; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px; overflow:hidden;}
  .stage{width:min(92vw,720px);}
  svg{width:100%; height:auto; display:block; filter:drop-shadow(0 0 14px rgba(242,162,74,.12));}

  .prompt{font-family:'Fraunces',serif; font-style:italic; font-size:clamp(17px,3.4vw,23px);
    color:var(--soft); text-align:center; margin-top:26px; min-height:2.4em;
    opacity:0; transition:opacity 2.4s ease; max-width:34ch; line-height:1.5;}
  .prompt.show{opacity:1;}
  .controls{position:fixed; bottom:20px; left:0; right:0; display:flex; gap:10px;
    justify-content:center;}
  button{background:transparent; border:1px solid #3a2b1c; color:var(--dim);
    font-family:'Plus Jakarta Sans',sans-serif; font-size:13px; padding:8px 18px;
    border-radius:20px; cursor:pointer; transition:all .3s;}
  button:hover, button.active{border-color:var(--lamp); color:var(--lamp);}
  .hint{position:fixed; top:18px; right:20px; font-size:11px; color:#4d3a26;
    letter-spacing:.06em;}
</style>

<div class="controls">
  <button id="btnOpen" class="active">Open · 8s</button>
  <button id="btnThink">Think · 2m</button>
</div>
<div class="hint">tap the drawing to pause</div>
<script>
(function(){
  const art = document.getElementById('art');
  const paths = [...art.querySelectorAll('path')];
  const promptEl = document.getElementById('prompt');

  const openPrompts = [
    "What is this session for?",
    "Name the one thing.",
    "What would be enough, today?",
    "What are you here to set down?",
    "One intention. The rest can wait on the shelf.",
  ];
  const thinkPrompts = [
    "Nothing to do here. Just watch the line.",
    "The clay is on the shelf. It keeps.",
    "Order from chaos \u2014 slowly, and on purpose.",
    "Held, not solved. That is also progress.",
    "Breathe at the speed of the line.",
  ];

  // measure once
  const lens = paths.map(p => p.getTotalLength());
  const total = lens.reduce((a,b)=>a+b,0);
  paths.forEach((p,i)=>{
    p.style.strokeDasharray = lens[i];
    p.style.strokeDashoffset = lens[i];
  });

  let raf=null, paused=false, t0=0, elapsed=0, duration=8000, mode='open';

  function frame(ts){
    if(!t0) t0=ts;
    const t = paused ? elapsed : (elapsed + ts - t0);
    const drawn = Math.min(t/duration,1) * total;   // px of line drawn so far
    let acc=0;
    for(let i=0;i<paths.length;i++){
      const remain = Math.max(0, Math.min(lens[i], drawn-acc));
      paths[i].style.strokeDashoffset = lens[i]-remain;
      acc += lens[i];
    }
    if(t/duration >= (mode==='open'?0.35:0.15)) promptEl.classList.add('show');
    if(t<duration){ raf=requestAnimationFrame(frame); }
  }

  function start(m){
    mode=m; duration = m==='open'?8000:120000;
    document.getElementById('btnOpen').classList.toggle('active', m==='open');
    document.getElementById('btnThink').classList.toggle('active', m==='think');
    const pool = m==='open'?openPrompts:thinkPrompts;
    promptEl.textContent = pool[Math.floor(Math.random()*pool.length)];
    promptEl.classList.remove('show');
    cancelAnimationFrame(raf); t0=0; elapsed=0; paused=false;
    paths.forEach((p,i)=>p.style.strokeDashoffset=lens[i]);
    raf=requestAnimationFrame(frame);
  }

  art.addEventListener('click', ()=>{
    if(!paused){ elapsed += performance.now()-t0; paused=true; cancelAnimationFrame(raf); }
    else { paused=false; t0=performance.now(); raf=requestAnimationFrame(frame); }
  });
  document.getElementById('btnOpen').onclick = ()=>start('open');
  document.getElementById('btnThink').onclick = ()=>start('think');

  start('open');
})();
</script>
