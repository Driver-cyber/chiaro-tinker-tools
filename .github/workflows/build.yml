name: Build macOS dmg

# Phase 0 "Trophy": wraps the app as-is into a macOS .dmg on GitHub's free
# macos-latest runner. Builds a universal binary (Apple Silicon + Intel).
# Runs on every push to main and can be started manually from the Actions
# tab (Run workflow) on any branch.
#
# The .dmg is unsigned and un-notarized — Gatekeeper will complain on first
# open. Workaround for family installs: right-click the app > Open > Open.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI (v2)
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build .dmg (universal)
        run: cargo tauri build --target universal-apple-darwin

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: pjt-trophy-macos-dmg
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
