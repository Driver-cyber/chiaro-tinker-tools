name: Build macOS dmg

# Phase 0 "Trophy": wraps the app as-is into a macOS .dmg on GitHub's free
# macos-latest runner. Builds a universal binary (Apple Silicon + Intel).
# Runs on every push to main and can be started manually from the Actions
# tab (Run workflow) on any branch.
#
# The .dmg is unsigned and un-notarized — Gatekeeper will complain on first
# open. Workaround for family installs: right-click the app > Open > Open.

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'If set (e.g. pjt-trophy), publish the .dmg as a GitHub Release under this tag'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI (v2)
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build .dmg (universal)
        run: cargo tauri build --target universal-apple-darwin

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: pjt-trophy-macos-dmg
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      # Manual runs with a release_tag publish the .dmg as a Release asset —
      # a plain, permanent download link (no artifact-zip wrapper). Creates
      # the tag at the built commit if it doesn't exist yet.
      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          fail_on_unmatched_files: true
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          body: |
            Unsigned macOS build (universal: Apple Silicon + Intel).

            **Install:** download the `.dmg`, open it, drag the app to Applications.
            **First launch:** right-click the app → Open → Open (Gatekeeper workaround for unsigned builds).
